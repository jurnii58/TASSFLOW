<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas - Tassflow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Force premium card styling */
        .stat-card, .chart-card, .card {
            background: rgba(20, 20, 30, 0.5) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 16px !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Floating Elements -->
    <div class="floating-element floating-1"></div>
    <div class="floating-element floating-2"></div>
    <div class="floating-element floating-3"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1><i class="fas fa-chart-bar"></i> Estadísticas</h1>
            <p>Métricas y análisis de tu rendimiento</p>
        </div>
        <div class="header-actions">
            <a href="{{ url_for('usuario.usuario_panel') }}" class="btn-secondary">
                <i class="fas fa-tasks"></i> Mis Tareas
            </a>
            <a href="{{ url_for('usuario.usuario_calendario') }}" class="btn-secondary">
                <i class="fas fa-calendar-alt"></i> Calendario
            </a>
            <div class="user-badge">
                <i class="fas fa-user"></i> {{ session.usuario }}
            </div>
            <a href="{{ url_for('auth.logout') }}" class="btn-danger">
                <i class="fas fa-sign-out-alt"></i> Salir
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-tasks"></i>
                </div>
                <div class="stat-content">
                    <h3>{{ total }}</h3>
                    <p>Total de Tareas</p>
                </div>
            </div>

            <div class="stat-card success">
                <div class="stat-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-content">
                    <h3>{{ completadas }}</h3>
                    <p>Completadas</p>
                </div>
            </div>

            <div class="stat-card danger">
                <div class="stat-icon">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-content">
                    <h3>{{ pendientes }}</h3>
                    <p>Pendientes</p>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="charts-section">
            <div class="chart-card">
                <div class="card-header">
                    <h3><i class="fas fa-chart-pie"></i> Progreso General</h3>
                </div>
                <div class="chart-container">
                    <canvas id="graficoCircular"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="card-header">
                    <h3><i class="fas fa-chart-bar"></i> Distribución de Tareas</h3>
                </div>
                <div class="chart-container">
                    <canvas id="graficoBarras"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        // Configure Chart.js defaults
        Chart.defaults.color = "var(--text-secondary)";
        Chart.defaults.font.family = "var(--font-family)";
        Chart.defaults.font.size = 12;

        const total = {{ total }};
        const completadas = {{ completadas }};
        const pendientes = {{ pendientes }};

        // Doughnut Chart
        new Chart(document.getElementById('graficoCircular'), {
            type: 'doughnut',
            data: {
                labels: ['Completadas', 'Pendientes'],
                datasets: [{
                    data: [completadas, pendientes],
                    backgroundColor: ['var(--success-color)', 'var(--accent-color)'],
                    borderColor: "var(--glass-bg)",
                    borderWidth: 3,
                    hoverBorderWidth: 4
                }]
            },
            options: {
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: 'var(--text-secondary)',
                            padding: 20,
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    }
                }
            }
        });

        // Bar Chart
        new Chart(document.getElementById('graficoBarras'), {
            type: 'bar',
            data: {
                labels: ['Completadas', 'Pendientes'],
                datasets: [{
                    label: 'Cantidad',
                    data: [completadas, pendientes],
                    backgroundColor: ['var(--success-color)', 'var(--accent-color)'],
                    borderRadius: 8,
                    borderSkipped: false
                }]
            },
            options: {
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: "rgba(255, 255, 255, 0.1)" },
                        border: { display: false },
                        ticks: { color: "var(--text-secondary)" }
                    },
                    x: {
                        grid: { display: false },
                        border: { display: false },
                        ticks: { color: "var(--text-secondary)" }
                    }
                }
            }
        });
    </script>
</body>
</html>
