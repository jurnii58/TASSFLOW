<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar - Tassflow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --glass-bg: rgba(20, 20, 20, 0.6); --glass-border: rgba(255, 255, 255, 0.1); --ios-orange: #ff9f0a; --text-main: #ffffff; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2560&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; background-color: #0f0f23; display: flex; align-items: center; justify-content: center; height: 100vh; color: var(--text-main); }
        .login-box { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 320px; margin: 20px;}
        .login-box h2 { margin-top: 0; font-size: 20px; margin-bottom: 5px; }
        .login-box p { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; font-size: 15px; box-sizing: border-box; outline: none; }
        .ios-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 15px; font-weight: bold; cursor: pointer; color: white; background: var(--ios-orange); transition: 0.2s; }
        .link-olvide { display: block; margin-top: 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Solicitar Reset</h2>
        <p>Enviaremos una alerta al Administrador para cambiar tu clave.</p>
        <form method="POST" action="{{ url_for('auth.olvide_password') }}">
            <input type="text" name="usuario" placeholder="Ingresa tu usuario" required autocomplete="off">
            <button type="submit" class="ios-btn">Solicitar Acceso</button>
        </form>
        <a href="{{ url_for('auth.login') }}" class="link-olvide">Volver al inicio</a>
    </div>
</body>
</html>
